name: Flipkart Price Checker Run

on:
  schedule:
    - cron: '0 */6 * * *' # Runs automatically every 6 hours
  workflow_dispatch: # Manual button on GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies & Pip Packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt # Removed 'backend/' since this is root on GitHub

    - name: Install Playwright Chromium Browser
      run: |
        python -m playwright install chromium

    - name: Execute Price Alert Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python main.py # Removed 'cd backend' since we are already here